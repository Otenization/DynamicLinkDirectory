name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend — install & syntax check
        working-directory: Backend
        run: |
          npm ci
          for f in $(git ls-files '*.js'); do node --check "$f" || exit 1; done

      - name: Frontend — install & build (tsc + vite)
        working-directory: Frontend
        run: |
          npm ci
          npm run build
